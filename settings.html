<div id="response_guard_settings" class="response-guard-settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>Response Guard</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <p class="response-guard-help">
        检查最新一条 AI 回复是否漏掉你要求附带的结构；如果缺失，只把缺失部分追加到这条回复末尾，不新建消息，也不重写正文。
      </p>

      <label for="response_guard_rules">
        <span>格式规范 / 检查规则</span>
      </label>
      <textarea
        id="response_guard_rules"
        class="text_pole textarea_compact"
        rows="10"
        placeholder="例如：每条回复末尾必须包含：
1. 【本回合摘要】1-3 句
2. 【下一步建议】仅在剧情进入分岔时给出 2-4 个选项
如果某项不适用，也要明确写出“不适用”。"
      ></textarea>

      <div class="response-guard-grid">
        <div>
          <label for="response_guard_api_mode">
            <span>调用方式</span>
          </label>
          <select id="response_guard_api_mode" class="text_pole">
            <option value="current">使用酒馆当前 API</option>
            <option value="custom">自定义 OpenAI-compatible API</option>
          </select>
        </div>

        <div>
          <label for="response_guard_temperature">
            <span>温度</span>
          </label>
          <input
            id="response_guard_temperature"
            class="text_pole"
            type="number"
            min="0"
            max="2"
            step="0.1"
          />
        </div>
      </div>

      <div id="response_guard_custom_api_fields" class="response-guard-custom-api hidden">
        <label for="response_guard_custom_base_url">
          <span>自定义 API 地址</span>
        </label>
        <input
          id="response_guard_custom_base_url"
          class="text_pole"
          type="text"
          placeholder="https://api.example.com/v1"
        />

        <label for="response_guard_custom_model">
          <span>模型名</span>
        </label>
        <div class="response-guard-model-row">
          <input
            id="response_guard_custom_model"
            class="text_pole"
            type="text"
            placeholder="gpt-4.1-mini"
          />
          <button id="response_guard_fetch_models" class="menu_button" type="button">
            获取模型
          </button>
        </div>
        <select id="response_guard_model_picker" class="text_pole hidden">
          <option value="">选择已获取的模型</option>
        </select>

        <label for="response_guard_custom_api_key">
          <span>API Key</span>
        </label>
        <input
          id="response_guard_custom_api_key"
          class="text_pole"
          type="password"
          placeholder="sk-..."
          autocomplete="off"
        />
      </div>

      <div class="response-guard-actions">
        <button id="response_guard_check_only" class="menu_button">仅检查</button>
        <button id="response_guard_check_and_fix" class="menu_button menu_button_icon">
          补齐到当前回复
        </button>
      </div>

      <div class="response-guard-note">
        <small>
          当前 API 模式只发送“最新回复 + 你的规则”做一次后台检查；补齐时会直接同层追加到最新回复末尾。
        </small>
      </div>
    </div>
  </div>
</div>
